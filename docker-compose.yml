services:
  db:
    image: mysql:8.0
    container_name: syllabify-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/libmysql
      - ./backend/db/init.sql:/docker-entrypointinnitdb.d/init.sql
    ports:
      - "3306:3306"

volumes:
  mysql_data: